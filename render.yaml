services:
  - type: web
    name: stock-advisor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --max-requests 50
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: TWELVEDATA_API_KEY
        sync: false  # 在 Render 控制台手动设置
    plan: free
